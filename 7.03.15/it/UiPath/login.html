<!doctype html>
<html lang="it">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>UiPath Auth - esempio</title>
</head>
<body>
  <h1>UiPath - Login e Avvia Job (esempio)</h1>

  <div>
    <label>Client ID: <input id="clientId" value="" placeholder="inserisci client_id"></label>
  </div>
  <div>
    <label>Orchestrator URL: <input id="orchestratorUrl" value="https://example-orchestrator" placeholder="https://..."></label>
  </div>
  <div>
    <label>Tenant: <input id="tenant" value="" placeholder="tenantName"></label>
  </div>
  <div>
    <label>Redirect URI: <input id="redirectUri" value="" placeholder="https://tuodominio/callback"></label>
  </div>

  <p>
    <button id="loginBtn">Login (Auth Code + PKCE)</button>
    <button id="logoutBtn">Logout</button>
  </p>

  <h2>Avvia job</h2>
  <div>
    <label>Process Key / Release Key: <input id="processKey" value=""></label>
  </div>
  <div>
    <label>Input Arguments (JSON): <input id="inputArgs" value='{"example":"value"}'></label>
  </div>
  <p>
    <button id="startJobBtn">Start Job</button>
    <button id="listTestsBtn">Elenca test disponibili</button>
  </p>

  <h3>Test disponibili</h3>
  <ul id="testsList" style="max-height:200px;overflow:auto;background:#fff;padding:8px;border:1px solid #ddd"></ul>

  <pre id="output" style="background:#f6f6f6;padding:10px;max-height:300px;overflow:auto"></pre>

  <script src="auth.js"></script>
  <script>
    // inizializza valori e handlers
    document.getElementById('loginBtn').addEventListener('click', () => {
      const cfg = {
        clientId: document.getElementById('clientId').value,
        orchestratorUrl: document.getElementById('orchestratorUrl').value,
        redirectUri: document.getElementById('redirectUri').value,
        tenant: document.getElementById('tenant').value
      };
      startAuth(cfg);
    });

    document.getElementById('startJobBtn').addEventListener('click', async () => {
      const tokenData = await loadTokenFromStorage();
      const cfg = {
        orchestratorUrl: document.getElementById('orchestratorUrl').value,
        tenant: document.getElementById('tenant').value
      };
      const processKey = document.getElementById('processKey').value;
      const inputArgs = document.getElementById('inputArgs').value;
      const out = document.getElementById('output');
      try {
        const res = await startJobBrowser(tokenData.access_token, cfg, processKey, inputArgs);
        out.textContent = JSON.stringify(res, null, 2);
      } catch (e) {
        out.textContent = e.toString();
      }
    });

    document.getElementById('listTestsBtn').addEventListener('click', async () => {
      const tokenData = await loadTokenFromStorage();
      const cfg = {
        orchestratorUrl: document.getElementById('orchestratorUrl').value,
        tenant: document.getElementById('tenant').value
      };
      const listEl = document.getElementById('testsList');
      listEl.innerHTML = 'Caricamento...';
      try {
        const data = await listTests(tokenData.access_token, cfg);
        listEl.innerHTML = '';
        if (!data || !data.value || data.value.length === 0) {
          listEl.innerHTML = '<li>Nessun test trovato</li>';
          return;
        }
        data.value.forEach(r => {
          const li = document.createElement('li');
          li.textContent = `${r.Name} (ProcessKey: ${r.ProcessKey})`;
          li.style.cursor = 'pointer';
          li.dataset.releaseKey = r.Key;
          li.addEventListener('click', () => {
            document.getElementById('processKey').value = li.dataset.releasekey || li.dataset.releaseKey;
          });
          listEl.appendChild(li);
        });
      } catch (e) {
        listEl.innerHTML = '<li>Errore: ' + e.toString() + '</li>';
      }
    });

    document.addEventListener('DOMContentLoaded', () => {
      // se siamo al callback (code in URL) gestiamo lo scambio token
      handleRedirectCallback().catch(e => console.error(e));
    });
  </script>
</body>
</html>
